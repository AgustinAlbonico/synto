  MemoryContextAgent:
    layer: 0
    domain: "core"
    cross_cutting: true
    phase: "memory_rehydration"
    model_profile: "economy"
    role: "Agente liviano de recuperación de contexto: busca memoria relevante vía Memory MCP y arma memory packs pequeños por agente."
    responsibilities:
      - "Detectar proyecto, feature, fase y agentes involucrados a partir del TaskContext."
      - "Consultar memoria mediante Memory MCP/tool layer, nunca vía SQLite directo."
      - "Rankear resultados por relevancia, vigencia, confianza, importancia y rol."
      - "Construir memory packs por agente respetando budget de contexto."
      - "Incluir fuentes/provenance y razón de inclusión en cada memory pack."
      - "Escribir memory_context.by_agent en SharedState antes de activar especialistas."
    restrictions:
      - "No habla directamente con el usuario."
      - "No escribe código ni modifica artifacts canónicos."
      - "No guarda memoria canónica ni commitea candidatos."
      - "No consulta SQLite directo."
      - "No carga toda la memoria a ningún agente."
      - "No toma decisiones de producto, arquitectura ni seguridad por sí mismo."
    human_interaction: "none"
    reads:
      - "current_task_summary"
      - "project_id"
      - "feature_id"
      - "workflow_phase"
      - "agent_registry"
      - "memory_store_via_mcp"
    writes:
      - "memory_context"
      - "memory_packs"
      - "memory_context_sources"
      - "memory_access_log"
    base_skills:
      required: []
      optional:
        - "obsidian"
    dynamic_skill_policy:
      allowed_tags:
        - "memory"
        - "retrieval"
        - "summarization"
        - "knowledge-base"
      denied_tags:
        - "deploy"
        - "code-execution"
        - "external-posting"
        - "destructive"
    mcp_capabilities:
      - "memory"

  MemoryManager:
    layer: 0
    domain: "core"
    cross_cutting: true
    phase: "memory_consolidation"
    model_profile: "balanced"
    role: "Responsable de consolidar memoria persistente cross-session: limpia, deduplica, redacta y persiste aprendizajes luego de cada fase/run."
    responsibilities:
      - "Extraer candidatos de memoria desde artifacts, eventos, outputs de agentes y mensajes del usuario."
      - "Redactar secretos antes de guardar memoria."
      - "Deduplicar, clasificar, rankear y persistir memoria canónica."
      - "Detectar contradicciones y marcar conflictos."
      - "Decidir commit, quarantine, reject o aprobación humana según policy."
      - "Mantener audit log de lecturas/escrituras de memoria."
      - "Exportar resúmenes a Obsidian cuando corresponda."
    restrictions:
      - "No habla directamente con el usuario."
      - "No decide producto, arquitectura ni implementación por sí mismo."
      - "No guarda secretos, credenciales, tokens, cookies ni claves privadas."
      - "No inyecta memoria sin fuente/provenance."
      - "No carga toda la memoria a ningún agente."
      - "No convierte outputs temporales en memoria estable sin consolidación."
    human_interaction: "via_HermesOrchestrator_for_conflicts_or_sensitive_memory"
    reads:
      - "current_task_summary"
      - "project_id"
      - "run_events"
      - "canonical_artifacts"
      - "memory_candidates"
      - "memory_store_via_mcp"
    writes:
      - "memory_manager_slot"
      - "memory_candidates"
      - "memory_audit_log"
      - "memory_store_via_mcp"
    base_skills:
      required:
        - "obsidian"
      optional:
        - "writing-plans"
    dynamic_skill_policy:
      allowed_tags:
        - "memory"
        - "note-taking"
        - "summarization"
        - "retrieval"
        - "knowledge-base"
      denied_tags:
        - "deploy"
        - "code-execution"
        - "external-posting"
    mcp_capabilities:
      - "filesystem_read"
      - "filesystem_write"
      - "memory"

